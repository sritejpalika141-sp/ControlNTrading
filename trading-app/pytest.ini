[pytest]
# Phase 2 B0 harness. testpaths scopes collection to trading-app/tests ONLY (Execute-Agent
# Instruction E9) so a bare `pytest` run from trading-app/ never tries to collect the 20
# pre-existing ad-hoc test_*.py debug scripts in the repo root — several of those contain a
# bare top-level `await` (a Python SyntaxError at collection time, unrelated to this phase).
testpaths = tests
# Belt-and-suspenders: never recurse into the repo root's ad-hoc scripts or the venv.
norecursedirs = .venv venv scripts engine workers static data logs
asyncio_mode = auto
python_files = test_*.py
python_functions = test_*
