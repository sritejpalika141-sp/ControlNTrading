version: '3.8'

services:
  trading-app:
    build: .
    container_name: trading_app_container
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/data  # Persists the SQLite database across restarts
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  sqlite_data:
    name: trading_app_sqlite_volume
